name: Publish to PyPI

on:
  push:
    branches: [develop]
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build
        run: uv build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment:
      name: testpypi
      url: https://test.pypi.org/p/qiao-mcp
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Get version
        id: version
        run: |
          VERSION=$(ls dist/*.whl | grep -oP '(?<=-)[0-9]+\.[0-9]+\.[0-9]+(?=-)')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if version exists on TestPyPI
        id: check
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://test.pypi.org/pypi/qiao-mcp/${{ steps.version.outputs.version }}/json")
          echo "exists=$([[ "$HTTP_CODE" == "200" ]] && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Publish to TestPyPI
        if: steps.check.outputs.exists == 'false'
        run: uvx twine upload --repository testpypi dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TESTPYPI_API_TOKEN }}

      - name: Skip - version already exists
        if: steps.check.outputs.exists == 'true'
        run: echo "Version ${{ steps.version.outputs.version }} already exists on TestPyPI, skipping."

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/qiao-mcp
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        run: uvx twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
